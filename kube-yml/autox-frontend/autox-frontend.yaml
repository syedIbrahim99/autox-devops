apiVersion: apps/v1
kind: Deployment
metadata:
  name: autox-frontend
  labels:
    app: autox-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autox-frontend
  template:
    metadata:
      labels:
        app: autox-frontend
    spec:
      containers:
      - name: autox-frontend
        image: RRR/rrr:ttt
        imagePullPolicy: Always
        command: ['npm', 'run', 'dev', '--', '--host', '0.0.0.0']
        #command: ["sh", "-c", "sleep infinity"]
        ports:
        - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: autox-frontend
spec:
  type: NodePort
  selector:
    app: autox-frontend
  ports:
    - protocol: TCP
      port: 5173

